<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/index.css" />
    <title>Bảo vệ sức khoẻ sinh sản của trẻ vị thành niên</title>
  </head>
  <body  data-bs-theme="">
    <div class="ms-3 mt-3 fs-2"><b>HP:</b> <span id="hp">100</span></div>
    <section class=" m-top container wg">
      <div
        class="px-5 py-3 rounded text-nowrap justify-content-center align-items-center border border-black"
      >
        <h4 id="questionTitle"></h4>
        <p id="questionText">
          
        </p>
      </div>
      <ul id="answers" class="list-group border border-black mt-1"></ul>
      </ul>
      <div class="d-flex mt-3">
        <button
          class="btn btn-outline-secondary text-dark"
          id="prevBtn"
          type="button"
        >
          Trở lại
        </button>
        <button class="btn btn-primary ms-auto" id="nextBtn" type="button">
          Tiếp theo
        </button>
      </div>
    </section>
    <div id="popup" class="modal fade">
      <div class="modal-dialog">
        <div class="modal-content p-3">
          <h5 id="popupTitle"></h5>
          <p id="popupText"></p>
          <button class="btn btn-primary" data-bs-dismiss="modal">OK</button>
        </div>
      </div>
    </div>

    <script src="./bootstrap/js/bootstrap.min.js"></script>
    <script src="./bootstrap/js/bootstrap.bundle.js"></script>
    <script src="./js/index.js"></script>
  </body>
</html>
